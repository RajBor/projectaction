<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="DealNector">
  <defs>
    <linearGradient id="dnGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A43B"/>
      <stop offset="100%" stop-color="#F4C842"/>
    </linearGradient>
    <linearGradient id="dnInk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A2340"/>
      <stop offset="100%" stop-color="#132B52"/>
    </linearGradient>
  </defs>
  <!-- Emblem: hex with D monogram -->
  <g transform="translate(4 8)">
    <path d="M24 0 L48 14 L48 34 L24 48 L0 34 L0 14 Z" fill="url(#dnInk)" stroke="#D4A43B" stroke-width="1.2"/>
    <text x="24" y="32" text-anchor="middle" font-family="'Source Serif 4','Source Serif Pro',Georgia,serif" font-weight="700" font-size="24" fill="url(#dnGold)">D</text>
  </g>
  <!-- Wordmark -->
  <text x="60" y="38" font-family="'Source Serif 4','Source Serif Pro',Georgia,serif" font-weight="700" font-size="28" letter-spacing="-0.5" fill="#0A2340">Deal<tspan font-style="italic" fill="#D4A43B">Nector</tspan></text>
  <!-- Tagline rule -->
  <line x1="60" y1="46" x2="304" y2="46" stroke="#D4A43B" stroke-width="0.75"/>
  <text x="60" y="58" font-family="'Inter',-apple-system,sans-serif" font-size="8.5" letter-spacing="2.4" fill="#5A6B82" font-weight="600">INSTITUTIONAL · INTELLIGENCE · TERMINAL</text>
</svg>
